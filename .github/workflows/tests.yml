name: Tests

on:
  pull_request:
  workflow_dispatch:

jobs:
  gut:
    name: Run GUT tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot 4.6.3
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: false
          include-templates: true

      - name: Verify Godot
        run: godot --version

      - name: Import resources
        run: godot --headless --import || true

      - name: Run tests
        run: godot --headless --script res://addons/gut/gut_cmdln.gd -gconfig=res://.gutconfig.json
